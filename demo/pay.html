<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pay with Zcash · Portal</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 28'%3E%3Cpath d='M2 28V12A10 10 0 0 1 22 12V28H2Z' fill='%23f4b728' stroke='%2314100a' stroke-width='0.6'/%3E%3C/svg%3E">
<link rel="stylesheet" href="/assets/fonts/fonts.css">
<link rel="stylesheet" href="/assets/tailwind.css">
<style>
  html, body { font-family: 'Inter', sans-serif; background: #060709; overflow-x: hidden; }
  h1, h2, h3, .font-display { font-family: 'Space Grotesk', sans-serif; }
  .serif-accent { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; }
  .card { background: #0e1017; border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; }
  .btn-gold { background: linear-gradient(120deg, #f7931a 0%, #f4b728 65%); color: #14100a; font-weight: 600; }
  .btn-gold:hover { filter: brightness(1.06); }
  @keyframes blurFadeUp {
    from { opacity: 0; filter: blur(20px); transform: translateY(40px); }
    to   { opacity: 1; filter: blur(0);    transform: translateY(0); }
  }
  .animate-blur-fade-up { opacity: 0; animation: blurFadeUp 1s ease-out forwards; }
</style>
</head>
<body class="text-white min-h-screen flex flex-col">

<nav class="flex items-center justify-between px-4 sm:px-6 md:px-12 py-5">
  <a href="/" class="flex items-center gap-2.5 animate-blur-fade-up" style="animation-delay:0ms;">
    <svg width="22" height="26" viewBox="0 0 24 28" fill="none"><path d="M2 28V12A10 10 0 0 1 22 12V28H2Z" fill="#f4b728" stroke="#14100a" stroke-width="0.6"/></svg>
    <span class="font-display text-lg" style="font-weight:600;">portal</span>
  </a>
  <a href="/" class="text-sm text-gray-400 hover:text-white transition-colors animate-blur-fade-up" style="animation-delay:100ms;">← Back to Portal</a>
</nav>

<main class="flex-1 flex items-center justify-center px-4 py-12">
  <div class="card p-8 sm:p-10 w-full max-w-md text-center animate-blur-fade-up" style="animation-delay:200ms;">
    <h1 id="title" class="text-2xl font-medium mb-1" style="letter-spacing:-0.02em;">Loading…</h1>
    <div id="amount" class="hidden text-5xl font-display text-gold my-4" style="font-weight:700; letter-spacing:-0.03em;"></div>
    <div id="label" class="hidden text-sm text-gray-500 mb-6"></div>

    <button id="payBtn" class="btn-gold rounded-full px-8 py-3 w-full hidden">Pay with Zcash</button>
    <div id="err" class="hidden mt-4 text-sm" style="color:#ff6b6b;"></div>

    <div id="paid" class="hidden text-left mt-2">
      <p class="text-sm mb-4" style="color:#5dd39e;">✓ Payment received. <span class="serif-accent">Verified on mainnet.</span></p>
      <div class="flex gap-4 text-sm">
        <a href="#" id="receiptLink" download="portal-receipt.png" class="text-gold hover:underline">Save receipt</a>
        <a href="#" id="explorerLink" target="_blank" rel="noopener" class="text-gold hover:underline">View on explorer</a>
      </div>
    </div>

    <p class="text-xs text-gray-600 mt-8">Powered by Portal. A Zcash payment request, detected live on mainnet.</p>
  </div>
</main>

<footer class="px-4 sm:px-6 md:px-12 py-8 text-center">
  <p class="text-xs text-gray-600">© 2026 Portal · ZecHub Hackathon 3.0</p>
</footer>

<script src="/sdk/portal.js"></script>
<script>
  const slug = location.pathname.split('/').filter(Boolean).pop();

  (async () => {
    const titleEl = document.getElementById('title');
    try {
      const link = await (await fetch(`/paylinks/${slug}`)).json();
      if (link.error) { titleEl.textContent = 'Payment link not found'; return; }
      titleEl.textContent = link.label;
      document.getElementById('amount').textContent = `${link.amount} ZEC`;
      document.getElementById('amount').classList.remove('hidden');
      document.getElementById('label').textContent = `${link.paymentCount} payment(s) received so far`;
      document.getElementById('label').classList.remove('hidden');
      document.getElementById('payBtn').classList.remove('hidden');
    } catch {
      titleEl.textContent = 'Could not load this payment link';
    }
  })();

  document.getElementById('payBtn').addEventListener('click', async (e) => {
    const btn = e.currentTarget;
    btn.disabled = true;
    document.getElementById('err').classList.add('hidden');
    try {
      const session = await Portal.pay({ server: '', slug });
      document.getElementById('paid').classList.remove('hidden');
      btn.classList.add('hidden');
      document.getElementById('receiptLink').href = Portal.receiptPng({ txid: session.txid, code: session.code });
      const ex = document.getElementById('explorerLink');
      if (session.txid) ex.href = Portal.explorerUrl(session.txid); else ex.classList.add('hidden');
    } catch (e2) {
      if (e2.message !== 'cancelled') {
        const err = document.getElementById('err');
        err.textContent = e2.message;
        err.classList.remove('hidden');
      }
    } finally { btn.disabled = false; }
  });
</script>
</body>
</html>
